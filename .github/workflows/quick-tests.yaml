name: Quick Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quick-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24.0

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code formatting issues found:"
            gofmt -s -d .
            exit 1
          fi

      - name: Vet code
        run: go vet ./...

      - name: Run unit tests (quick)
        run: go test ./... -v --skip TestIntegration -timeout 30s -short

      - name: Build binary
        run: go build -o cucaracha .

      - name: Test cucaracha --help
        run: ./cucaracha --help

      - name: Test debug command
        run: ./cucaracha debug --help

      - name: Test cpu command
        run: ./cucaracha cpu --help

      - name: Test tools command
        run: ./cucaracha tools --help

      - name: Test tui command
        run: ./cucaracha tui --help
